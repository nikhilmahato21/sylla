version: "3.9"

services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: sylla-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-sylla_redis_pass}
    restart: unless-stopped

volumes:
  redis_data:
