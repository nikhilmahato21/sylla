[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "sylla-api"

[environments.production.variables]
NODE_ENV = "production"
PORT = "3001"